<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
overflow:hidden;
}

h1{
margin-top:20px;
}

#character{
width:256px;
image-rendering:pixelated;
transition:0.2s;
}

#text{
font-size:38px;
margin-top:20px;
}

#roma{
font-size:22px;
color:#aaa;
margin-bottom:20px;
}

#input{
font-size:26px;
padding:10px;
width:60%;
text-align:center;
}

#score{
font-size:24px;
margin-top:20px;
}

#combo{
font-size:30px;
color:yellow;
margin-top:10px;
font-weight:bold;
}

#timer{
font-size:28px;
margin-top:10px;
color:#00ffcc;
}

.power{
filter:drop-shadow(0 0 15px orange);
transform:scale(1.1);
}

.speed{
animation:shake 0.08s infinite;
}

@keyframes shake{
0%{transform:translateX(0);}
50%{transform:translateX(4px);}
100%{transform:translateX(0);}
}

</style>

</head>

<body>

<h1>💪 筋トレタイピング 💪</h1>

<img id="character" src="lv1_idle.png">

<div id="text"></div>
<div id="roma"></div>

<input id="input" autofocus>

<div id="timer">TIME : 60</div>
<div id="score">SCORE : 0</div>
<div id="combo">COMBO x0</div>

<script>

const questions = [

{
jp:"スクワット",
roma:"sukuwatto"
},

{
jp:"タンパク質",
roma:"tanpakushitsu"
},

{
jp:"フォーム",
roma:"fo-mu"
},

{
jp:"継続は力なり",
roma:"keizokuhachikaranari"
},

{
jp:"ベンチプレス",
roma:"benchipuresu"
},

{
jp:"デッドリフト",
roma:"deddorifuto"
},

{
jp:"筋肉痛",
roma:"kinnnikutsuu"
},

{
jp:"プロテイン",
roma:"purotein"
}

];

let currentQuestion;

let score = 0;
let combo = 0;
let fatigue = 0;
let time = 60;

let isAnimating = false;
let isTired = false;

const text =
document.getElementById("text");

const roma =
document.getElementById("roma");

const input =
document.getElementById("input");

const scoreText =
document.getElementById("score");

const comboText =
document.getElementById("combo");

const timerText =
document.getElementById("timer");

const character =
document.getElementById("character");

function setQuestion(){

currentQuestion =
questions[
Math.floor(Math.random()*questions.length)
];

text.textContent =
currentQuestion.jp;

roma.textContent =
currentQuestion.roma;

input.value = "";

}

function updateCharacter(){

if(isAnimating) return;

if(isTired){

if(fatigue >= 6){

character.src = "exhausted.png";

}
else if(fatigue >= 4){

character.src = "tired_big.png";

}
else{

character.src = "tired_small.png";

}

return;

}

if(score < 100){

character.src = "lv1_idle.png";

}
else if(score < 300){

character.src = "lv2_idle.png";

}
else if(score < 600){

character.src = "lv3_idle.png";

}
else if(score < 1000){

character.src = "lv4_idle.png";

}
else{

character.src = "lv5_idle.png";

}

if(combo >= 20){

character.classList.add("power");

}
else{

character.classList.remove("power");

}

if(combo >= 10){

character.classList.add("speed");

}
else{

character.classList.remove("speed");

}

}

function playLift(){

isAnimating = true;

character.src = "lift_up.png";

setTimeout(()=>{

character.src = "lift_down.png";

},400);

setTimeout(()=>{

isAnimating = false;

updateCharacter();

},1000);

}

function startTimer(){

const timer = setInterval(()=>{

time--;

timerText.textContent =
"TIME : " + time;

if(time <= 0){

clearInterval(timer);

input.disabled = true;

alert("終了！ SCORE : " + score);

}

},1000);

}

input.addEventListener("input",()=>{

const value = input.value;

if(currentQuestion.roma.startsWith(value)){

if(value === currentQuestion.roma){

combo++;

score += 50;

if(fatigue > 0){

fatigue--;

}

playLift();

scoreText.textContent =
"SCORE : " + score;

comboText.textContent =
"COMBO x" + combo;

setTimeout(()=>{

setQuestion();

},1000);

}

}
else{

combo = 0;

fatigue++;

isTired = true;

comboText.textContent =
"COMBO x0";

updateCharacter();

setTimeout(()=>{

isTired = false;

updateCharacter();

},1200);

}

});

setQuestion();

updateCharacter();

startTimer();

</script>

</body>
</html>
