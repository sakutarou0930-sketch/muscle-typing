<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

h1 {
  margin-top: 20px;
}

#character {
  width: 256px;
  image-rendering: pixelated;
  transition: all 0.2s;
}

#text {
  font-size: 28px;
  margin: 20px;
}

#input {
  font-size: 22px;
  padding: 10px;
  width: 60%;
  text-align: center;
}

#timer,
#score,
#combo,
#fatigueText {
  font-size: 24px;
  margin-top: 10px;
}

#combo {
  color: yellow;
  font-weight: bold;
}

.power {
  filter: drop-shadow(0 0 12px orange);
  transform: scale(1.1);
}

.speed {
  animation: shake 0.1s infinite;
}

@keyframes shake {
  0% { transform: translateX(0); }
  50% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

#ranking {
  list-style: none;
  padding: 0;
}

#ranking li {
  margin: 5px 0;
}
</style>
</head>

<body>

<h1>💪 筋トレタイピング 💪</h1>

<input id="nameInput" placeholder="名前を入力">

<br><br>

<img id="character" src="lv1_idle.png">

<div id="text"></div>

<input id="input" autocomplete="off">

<div id="timer">TIME: 60</div>
<div id="score">SCORE: 0</div>
<div id="combo">COMBO x0</div>
<div id="fatigueText"></div>

<h2>🏆 ランキング</h2>
<ol id="ranking"></ol>

<audio id="okSound" src="ok.mp3"></audio>
<audio id="missSound" src="miss.mp3"></audio>

<script>

const texts = [
  "スクワットは下半身を鍛える",
  "タンパク質は筋肉の材料",
  "フォームが重要",
  "継続は力なり",
  "筋トレは習慣が大事",
  "正しい姿勢を意識する"
];

let current = "";
let score = 0;
let combo = 0;
let fatigue = 0;
let time = 60;
let timerStarted = false;

const input = document.getElementById("input");
const textEl = document.getElementById("text");
const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const timerEl = document.getElementById("timer");
const fatigueText = document.getElementById("fatigueText");
const character = document.getElementById("character");
const rankingEl = document.getElementById("ranking");
const nameInput = document.getElementById("nameInput");

const okSound = document.getElementById("okSound");
const missSound = document.getElementById("missSound");

const normalCharacters = [
  "lv1_idle.png",
  "lv2_idle.png",
  "lv3_idle.png",
  "lv4_idle.png",
  "lv5_idle.png"
];

function newText() {
  current = texts[Math.floor(Math.random() * texts.length)];
  textEl.textContent = current;
  input.value = "";
}

function getLevel() {
  if (score < 100) return 0;
  if (score < 300) return 1;
  if (score < 600) return 2;
  if (score < 1000) return 3;
  return 4;
}

function updateCharacter() {

  if (fatigue > 80) {
    character.src = "exhausted.png";
    fatigueText.textContent = "限界状態…";
    return;
  }

  if (fatigue > 50) {
    character.src = "tired_big.png";
    fatigueText.textContent = "かなり疲れている";
    return;
  }

  if (fatigue > 30) {
    character.src = "tired_small.png";
    fatigueText.textContent = "少し疲れている";
    return;
  }

  fatigueText.textContent = "";

  character.src = normalCharacters[getLevel()];
}

function playLift() {

  if (fatigue > 80) return;

  character.src = "lift_up.png";

  setTimeout(() => {
    character.src = "lift_down.png";
  }, 100);

  setTimeout(() => {
    updateCharacter();
  }, 200);
}

function updateEffects() {

  character.classList.remove("power");
  character.classList.remove("speed");

  if (combo >= 20) {
    character.classList.add("power");
  }
  else if (combo >= 10) {
    character.classList.add("speed");
  }
}

function updateUI() {
  scoreEl.textContent = "SCORE: " + score;
  comboEl.textContent = "COMBO x" + combo;

  updateCharacter();
  updateEffects();
}

function startTimer() {

  const timer = setInterval(() => {

    time--;

    timerEl.textContent = "TIME: " + time;

    if (time <= 0) {

      clearInterval(timer);

      input.disabled = true;

      saveRanking();

      showRanking();

      alert("終了！ SCORE : " + score);

    }

  }, 1000);
}

function saveRanking() {

  const name = nameInput.value || "名無し";

  let ranking = JSON.parse(localStorage.getItem("muscleRanking") || "[]");

  ranking.push({
    name: name,
    score: score
  });

  ranking.sort((a, b) => b.score - a.score);

  ranking = ranking.slice(0, 5);

  localStorage.setItem("muscleRanking", JSON.stringify(ranking));
}

function showRanking() {

  rankingEl.innerHTML = "";

  let ranking = JSON.parse(localStorage.getItem("muscleRanking") || "[]");

  ranking.forEach(r => {

    const li = document.createElement("li");

    li.textContent = r.name + " - " + r.score;

    rankingEl.appendChild(li);

  });
}

input.addEventListener("input", () => {

  if (!timerStarted) {
    timerStarted = true;
    startTimer();
  }

  const value = input.value;

  if (value === current) {

    score += 50;
    combo++;

    fatigue -= 5;

    if (fatigue < 0) fatigue = 0;

    okSound.currentTime = 0;
    okSound.play();

    playLift();

    newText();
  }

  else if (!current.startsWith(value)) {

    combo = 0;

    fatigue += 15;

    if (fatigue > 100) fatigue = 100;

    missSound.currentTime = 0;
    missSound.play();
  }

  else {

    combo++;

    fatigue -= 2;

    if (fatigue < 0) fatigue = 0;

    playLift();
  }

  updateUI();

});

newText();
showRanking();
updateUI();

</script>

</body>
</html>
