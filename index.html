<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>
body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

#character{
width:256px;
image-rendering:pixelated;
}

#text{
font-size:32px;
margin-top:20px;
}

#input{
font-size:24px;
padding:10px;
width:60%;
margin-top:20px;
}

#combo{
font-size:28px;
color:yellow;
margin-top:10px;
}

</style>
</head>

<body>

<h1>💪 筋トレタイピング 💪</h1>

<img id="character" src="lv1_idle.png">

<div id="text">loading...</div>

<input id="input" autofocus>

<div id="score">SCORE:0</div>
<div id="combo">COMBO x0</div>

<script>

const questions = [

{
jp:"スクワット",
roma:"sukuwatto"
},

{
jp:"タンパク質",
roma:"tanpakushitsu"
},

{
jp:"フォームが重要",
roma:"fo-mugajuuyou"
},

{
jp:"継続は力なり",
roma:"keizokuhachikaranari"
}

];

let currentQuestion;
let score = 0;
let combo = 0;

const text = document.getElementById("text");
const input = document.getElementById("input");
const scoreText = document.getElementById("score");
const comboText = document.getElementById("combo");

function setQuestion(){

currentQuestion =
questions[
Math.floor(Math.random()*questions.length)
];

text.textContent =
currentQuestion.jp + " (" + currentQuestion.roma + ")";

input.value = "";

}

input.addEventListener("input",()=>{

const value = input.value;

if(currentQuestion.roma.startsWith(value)){

combo++;

comboText.textContent =
"COMBO x" + combo;

if(value === currentQuestion.roma){

score += 50;

scoreText.textContent =
"SCORE:" + score;

setQuestion();

}

}
else{

combo = 0;

comboText.textContent =
"COMBO x0";

}

});

setQuestion();

</script>

</body>
</html>
