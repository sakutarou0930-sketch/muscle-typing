<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>
body {
  background:#111;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

#character {
  width:256px;
  image-rendering: pixelated;
  transition: all 0.2s;
}

#text-container {
  margin: 20px;
}

#text-furigana {
  font-size:24px;
  color: #aaa;
  margin-bottom: -5px;
}

#text-jp {
  font-size:40px;
  font-weight: bold;
}

#text-en {
  font-size:32px; 
  color: #888;    
  margin-top: 5px;
  letter-spacing: 2px;
}

.typed {
  color: #0f0;
  text-shadow: 0 0 5px #0f0;
}

.combo { font-size:28px; color:yellow; }
.power { filter: drop-shadow(0 0 10px orange); transform: scale(1.1); }
.speed { animation: shake 0.1s infinite; }
.tired { filter: brightness(0.7); }
.exhausted { filter: grayscale(0.6); transform: scale(0.95); }
.miss { animation: miss-shake 0.2s; filter: drop-shadow(0 0 15px red); } 

#missText {
  color: #ff6666;
  font-size: 20px;
  font-weight: bold;
  margin-top: 5px;
}

@keyframes shake {
  0% { transform: translateX(0); }
  50% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

@keyframes miss-shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  75% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}

.type-bounce {
  animation: bounce-type 0.1s;
}
@keyframes bounce-type {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

#gameLogo {
  margin: 10px auto 0;
  display: block;
  image-rendering: pixelated; /* ドット絵のロゴなのでくっきり表示 */
  width: 500px;
  max-width: 90%;
}

#nameInput {
  margin-top:10px;
  padding:5px;
}

#startButton {
  cursor: pointer;
  margin-bottom: 10px;
  transition: transform 0.1s;
}
#startButton:hover {
  transform: scale(1.05);
}
#startButton:active {
  transform: scale(0.95);
}

#bgmToggleBtn {
  padding: 8px 15px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: #333;
  color: #fff;
  border: 2px solid #555;
  border-radius: 5px;
  transition: all 0.2s;
  z-index: 100;
}
#bgmToggleBtn:hover {
  background: #555;
}

#retryButton {
  display: none;
  cursor: pointer;
  margin: 10px auto;
  max-width: 250px; 
  transition: transform 0.1s;
}
#retryButton:hover {
  transform: scale(1.05); 
}
#retryButton:active {
  transform: scale(0.95); 
}

#imeWarning {
  display: none;
  color: #ff4444;
  font-size: 20px;
  font-weight: bold;
  margin: 10px auto;
  padding: 10px;
  border: 2px solid #ff4444;
  background: rgba(255,0,0,0.1);
  width: 80%;
  max-width: 600px;
  border-radius: 5px;
}

function generateRomaji(kanaStr) {
  if (kanaStr.length === 0) return [""];
  
  let token = kanaStr[0];
  let nextChar = kanaStr[1];
  
  let doubleToken = kanaStr.substr(0, 2);
  if (kanaStr.length >= 2 && romajiMap[doubleToken]) {
    let tails = generateRomaji(kanaStr.substring(2));
    let res = [];
    for (let r of romajiMap[doubleToken]) {
      for (let t of tails) res.push(r + t);
    }
    return res;
  }
  
  if (token === 'っ' && nextChar) {
    let res = [];
    let tailsNormal = generateRomaji(kanaStr.substring(1));
    for (let t of tailsNormal) {
      res.push('xtsu' + t);
      res.push('ltu' + t);
      res.push('xtu' + t);
      
      let firstChar = t[0];
      if (firstChar && /[a-z]/.test(firstChar) && !/[aeiou]/.test(firstChar)) {
        res.push(firstChar + t);
      }
    }
    return [...new Set(res)];
  }
  
  if (token === 'ん') {
    let res = [];
    let tails = generateRomaji(kanaStr.substring(1));
    for (let t of tails) {
      res.push('nn' + t);
      if (t.length > 0) {
        let firstChar = t[0];
        if (!/[aeiouyn]/.test(firstChar)) {
          res.push('n' + t);
        }
      } else {
        res.push('n' + t);
      }
    }
    return [...new Set(res)];
  }
  
  if (romajiMap[token]) {
    let tails = generateRomaji(kanaStr.substring(1));
    let res = [];
    for (let r of romajiMap[token]) {
      for (let t of tails) res.push(r + t);
    }
    return res;
  }
  
  let tails = generateRomaji(kanaStr.substring(1));
  let res = [];
  for (let t of tails) res.push(token + t);
  return res;
}

const rankingEl = document.getElementById("ranking");
const nameInput = document.getElementById("nameInput");
const startButton = document.getElementById("startButton");
const retryButton = document.getElementById("retryButton");

const bgmAudio = document.getElementById("bgm"); 
const startSound = document.getElementById("startSound"); 
const okSound = document.getElementById("okSound");
const missSound = document.getElementById("missSound");

const idleCharacters = [
  "lv1_idle.png",
  "lv2_idle.png",
  "lv3_idle.png",
  "lv4_idle.png",
  "lv5_idle.png"
];

// =====================================
// BGMをどこかでクリック/キー入力した瞬間に鳴らす処理
// =====================================
function startBackgroundMusic() {
  if (isBgmPlaying) return; // すでに鳴っていれば何もしない

  const randomBGM = bgmList[Math.floor(Math.random() * bgmList.length)];
  bgmAudio.src = randomBGM;
  bgmAudio.volume = 0.3; 

  // 再生を試みる
  bgmAudio.play().then(() => {
    isBgmPlaying = true; // 正常に再生されたらフラグをオン
  }).catch(function(error) {
    // クリック前に勝手に実行されてブラウザにブロックされた場合は無視（次のクリックを待つ）
  });
}

// 画面のどこかをクリックするか、キーボードを押した瞬間にBGMをスタート
document.addEventListener("click", startBackgroundMusic);
document.addEventListener("keydown", startBackgroundMusic);

// BGMのON/OFF切り替えボタンの処理
const bgmToggleBtn = document.getElementById("bgmToggleBtn");
bgmToggleBtn.addEventListener("click", () => {
  const isMuted = !bgmAudio.muted;
  bgmAudio.muted = isMuted;
  startSound.muted = isMuted;
  okSound.muted = isMuted;
  missSound.muted = isMuted;
  
  if (isMuted) {
    bgmToggleBtn.textContent = "🔇 音声 OFF";
    bgmToggleBtn.style.color = "#aaa";
  } else {
    bgmToggleBtn.textContent = "🔊 音声 ON";
    bgmToggleBtn.style.color = "#fff";
  }
  // クリック後にボタンからフォーカスを外す（タイピングの誤作動防止）
  bgmToggleBtn.blur();
});
// =====================================

function newText() {
  if (availableTexts.length === 0) {
    availableTexts = [...texts];
  }
  const index = Math.floor(Math.random() * availableTexts.length);
  const rnd = availableTexts[index];
  availableTexts.splice(index, 1);

  currentFurigana = rnd.kana;
  currentJp = rnd.jp;
  untypedEnList = generateRomaji(rnd.kana);
  typedEn = "";
  updateTextDisplay();
}

function updateTextDisplay() {
  textFuriganaEl.textContent = currentFurigana;
  textJpEl.textContent = currentJp;
  // 画面には、現在有効なローマ字候補のうち最初のものを表示する
  const displayEn = untypedEnList.length > 0 ? untypedEnList[0] : "";
  textEnEl.innerHTML = `<span class="typed">${typedEn}</span>${displayEn}`;
}

function getLevel() {
  if (score < 100) return 0;
  if (score < 300) return 1;
  if (score < 600) return 2;
  if (score < 1000) return 3;
  return 4;
}

function updateCharacter() {
  if (fatigue >= FATIGUE_LV3) {
    char.src = "exhausted.png";
    return;
  } else if (fatigue >= FATIGUE_LV2) {
    char.src = "tired_big.png";
    return;
  } else if (fatigue >= FATIGUE_LV1) {
    char.src = "tired_smal.png";
    return;
  }

  if (combo >= COMBO_LV3) {
    char.src = "aura.png";
    return;
  } else if (combo >= COMBO_LV2) {
    char.src = "speed.png";
    return;
  } else if (combo >= COMBO_LV1) {
    char.src = "double_dumbbell.png";
    return;
  }

  char.src = idleCharacters[getLevel()];
}

let liftTimeout1, liftTimeout2;

function playLift() {
  clearTimeout(liftTimeout1);
  clearTimeout(liftTimeout2);

  char.classList.remove("type-bounce");
  void char.offsetWidth;
  char.classList.add("type-bounce");

  if (combo >= COMBO_LV1 || fatigue >= FATIGUE_LV1) {
    updateCharacter();
    return;
  }

  char.src = "lift_up.png";

  liftTimeout1 = setTimeout(() => {
    char.src = "lift_down.png";
  }, 100);

  liftTimeout2 = setTimeout(() => {
    updateCharacter();
  }, 200);
}

function updateEffects() {
  char.classList.remove("power","speed","tired","exhausted","miss");

  if (combo >= COMBO_LV3) char.classList.add("power");
  else if (combo >= COMBO_LV2) char.classList.add("speed");

  if (fatigue >= FATIGUE_LV3) char.classList.add("exhausted");
  else if (fatigue >= FATIGUE_LV2) char.classList.add("tired");
}

function triggerMissEffect() {
  char.classList.remove("miss");
  void char.offsetWidth; 
  char.classList.add("miss");
}

function startGame() {
  if (isPlaying) return;
  
  // 名前が入力されていない場合はアラートを出して開始しない
  if (nameInput.value.trim() === "") {
    alert("名前を入力してください！");
    nameInput.focus(); // 入力欄にフォーカスを当てる
    return;
  }

  // 入力された名前をブラウザに記憶させる
  localStorage.setItem("savedPlayerName", nameInput.value.trim());

  isPlaying = true;
  score = 0;
  combo = 0;
  fatigue = 0;
  missCount = 0; 
  time = 60;
  
  startSound.currentTime = 0;
  startSound.play().catch(e => console.log(e));
  
  startButton.style.display = "none";
  retryButton.style.display = "none"; 
  document.getElementById("gameLogo").style.display = "none";
  nameInput.disabled = true; 
  document.getElementById("imeWarning").style.display = "none";

  updateDisplay();
  newText();
  updateCharacter();

  timerInterval = setInterval(() => {
    time--;
    timerEl.textContent = "TIME: " + time;

    if (time <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  isPlaying = false;
  
  // ゲーム終了時のBGMストップをなくし、そのままBGMが流れ続けるようにしました
  
  retryButton.style.display = "block";
  document.getElementById("gameLogo").style.display = "block";
  nameInput.disabled = false;
  
  textJpEl.textContent = "終了！";
  textEnEl.innerHTML = "";

  // スコア保存とランキング取得を非同期で実行
  (async () => {
    await saveRanking();
    await showRanking();
  })();
  
  setTimeout(() => alert("終了！\nスコア: " + score + "\nミス回数: " + missCount + "回"), 100);
}

async function saveRanking() {
  const name = nameInput.value || "名無し";
  const dateStr = new Date().toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  
  // ローカルにも一応保存
  let data = JSON.parse(localStorage.getItem("ranking") || "[]");
  data.push({name, score, date: dateStr});
  data.sort((a,b)=>b.score-a.score);
  data = data.slice(0,5);
  localStorage.setItem("ranking", JSON.stringify(data));

  // GASへスコアを送信
  if (GAS_URL !== "YOUR_GAS_WEB_APP_URL_HERE") {
    try {
      await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `name=${encodeURIComponent(name)}&score=${score}&date=${encodeURIComponent(dateStr)}`
      });
    } catch (e) {
      console.error("スコア送信エラー:", e);
    }
  }
}

async function showRanking() {
  rankingEl.innerHTML = "<li>読み込み中...</li>";
  
  if (GAS_URL === "YOUR_GAS_WEB_APP_URL_HERE") {
    rankingEl.innerHTML = "";
    let data = JSON.parse(localStorage.getItem("ranking") || "[]");
    data.forEach(d => {
      const li = document.createElement("li");
      const dateText = d.date ? ` (${d.date})` : "";
      li.textContent = `${d.name} - ${d.score}${dateText}`;
      rankingEl.appendChild(li);
    });
    return;
  }

  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    rankingEl.innerHTML = "";
    data.slice(0, 10).forEach(d => {
      const li = document.createElement("li");
      const dateText = d.date ? ` (${d.date})` : "";
      li.textContent = `${d.name} - ${d.score}${dateText}`;
      rankingEl.appendChild(li);
    });
  } catch (e) {
    console.error("ランキング取得エラー:", e);
    let errMsg = e.message;
    if (errMsg === "Failed to fetch") {
      errMsg += " (Google側のアクセス権限が「全員」になっていない可能性があります)";
    }
    rankingEl.innerHTML = `<li>ランキングの取得に失敗しました<br><span style="font-size:12px;color:#ffaa00;">エラー原因: ${errMsg}</span></li>`;
  }
}

function updateDisplay() {
  comboEl.textContent = "COMBO x" + combo;
  scoreEl.textContent = "SCORE: " + score;
  fatigueEl.textContent = "疲労度: " + fatigue + "%";
  missTextEl.textContent = "MISS: " + missCount; 
}

startButton.addEventListener("click", startGame);
retryButton.addEventListener("click", startGame); 

document.addEventListener("keydown", (e) => {
  if (!isPlaying) return;
  if (document.activeElement === nameInput) return; 

  if (e.keyCode === 229 || e.key === "Process" || e.isComposing) {
    document.getElementById("imeWarning").style.display = "block";
    return;
  } else {
    document.getElementById("imeWarning").style.display = "none";
  }

  if (e.key.length !== 1) return; 

  const key = e.key.toLowerCase(); 

  // 押されたキーで始まるローマ字候補だけを絞り込む
  const validCandidates = untypedEnList.filter(romaji => romaji.startsWith(key));

  if (validCandidates.length > 0) {
    // 正解のキー入力だった場合
    typedEn += key;
    // 全ての有効な候補の先頭1文字を削る
    untypedEnList = validCandidates.map(romaji => romaji.substring(1));

    combo++;
    score += 10; 
    fatigue = Math.max(0, fatigue - 1); 

    playLift(); 
    updateTextDisplay();

    // どれか一つでも空文字（最後まで打った）になればクリア
    if (untypedEnList.some(romaji => romaji.length === 0)) {
      score += 50;
      fatigue = Math.max(0, fatigue - 5);
      okSound.currentTime = 0;
      okSound.play().catch(e => {}); 
      newText();
    }
  } 
  else {
    combo = 0;
    fatigue = Math.min(100, fatigue + 15);
    missCount++; 
    
    missSound.currentTime = 0;
    missSound.play().catch(e => {}); 
    triggerMissEffect(); 

    updateCharacter();
  }

  updateDisplay();
  updateEffects();
});

showRanking();
// 最終更新日時の自動表示 (GitHub APIを使用)
document.addEventListener("DOMContentLoaded", async () => {
  // 保存された名前があれば自動入力する
  const savedName = localStorage.getItem("savedPlayerName");
  if (savedName) {
    document.getElementById("nameInput").value = savedName;
  }

  const displayEl = document.getElementById("lastModifiedDisplay");
  try {
    const res = await fetch("https://api.github.com/repos/sakutarou0930-sketch/muscle-typing/commits?path=index.html&page=1&per_page=1");
    if (!res.ok) throw new Error("APIエラー");
    const data = await res.json();
    if (data && data.length > 0) {
      const d = new Date(data[0].commit.committer.date);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      displayEl.textContent = `最終更新：${yyyy}/${mm}/${dd} ${hh}:${min}`;
    }
  } catch (e) {
    // 取得失敗時はブラウザのキャッシュ時刻で代用
    const d = new Date(document.lastModified);
    if (!isNaN(d.getTime())) {
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      displayEl.textContent = `最終更新：${yyyy}/${mm}/${dd} ${hh}:${min}`;
    }
  }
});
