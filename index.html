<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:sans-serif;
}

h1{
margin-top:20px;
}

#character{
width:256px;
image-rendering:pixelated;
}

#text{
font-size:36px;
margin-top:20px;
}

#roma{
font-size:20px;
color:#aaa;
margin-bottom:20px;
}

#input{
font-size:24px;
padding:10px;
width:60%;
text-align:center;
}

#score{
font-size:24px;
margin-top:20px;
}

#combo{
font-size:28px;
color:yellow;
margin-top:10px;
}

</style>

</head>

<body>

<h1>💪 筋トレタイピング 💪</h1>

<img id="character" src="lv1_idle.png">

<div id="text"></div>
<div id="roma"></div>

<input id="input" autofocus>

<div id="score">SCORE:0</div>
<div id="combo">COMBO x0</div>

<script>

const questions = [

{
jp:"スクワット",
roma:"sukuwatto"
},

{
jp:"タンパク質",
roma:"tanpakushitsu"
},

{
jp:"フォーム",
roma:"fo-mu"
},

{
jp:"継続は力なり",
roma:"keizokuhachikaranari"
}

];

let currentQuestion;
let score = 0;
let combo = 0;

const text =
document.getElementById("text");

const roma =
document.getElementById("roma");

const input =
document.getElementById("input");

const scoreText =
document.getElementById("score");

const comboText =
document.getElementById("combo");

const character =
document.getElementById("character");

function setQuestion(){

currentQuestion =
questions[
Math.floor(Math.random()*questions.length)
];

text.textContent =
currentQuestion.jp;

roma.textContent =
currentQuestion.roma;

input.value = "";

}

function updateCharacter(){

if(score < 100){

character.src = "lv1_idle.png";

}
else if(score < 300){

character.src = "lv2_idle.png";

}
else if(score < 600){

character.src = "lv3_idle.png";

}
else if(score < 1000){

character.src = "lv4_idle.png";

}
else{

character.src = "lv5_idle.png";

}

}

function playLift(){

character.src = "lift_up.png";

setTimeout(()=>{

character.src = "lift_down.png";

},300);

setTimeout(()=>{

updateCharacter();

},600);

}

input.addEventListener("input",()=>{

const value = input.value;

if(currentQuestion.roma.startsWith(value)){

if(value === currentQuestion.roma){

combo++;

score += 50;

playLift();

scoreText.textContent =
"SCORE:" + score;

comboText.textContent =
"COMBO x" + combo;

setQuestion();

}

}
else{

combo = 0;

comboText.textContent =
"COMBO x0";

}

});

setQuestion();

</script>

</body>
</html>
