<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>

body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin-top: 20px;
}

h1 {
  margin-bottom: 10px;
}

#character {
  width: 256px;
  image-rendering: pixelated;
  transition: all 0.2s;
}

#text {
  font-size: 28px;
  margin: 20px;
  min-height: 40px;
}

#input {
  font-size: 24px;
  padding: 10px;
  width: 60%;
  text-align: center;
}

#nameInput {
  padding: 5px;
  margin-top: 10px;
}

.combo {
  font-size: 30px;
  color: yellow;
  margin-top: 10px;
}

.power {
  filter: drop-shadow(0 0 10px orange);
  transform: scale(1.1);
}

.speed {
  animation: shake 0.1s infinite;
}

.tired {
  filter: brightness(0.7);
}

.exhausted {
  filter: grayscale(0.7);
  transform: scale(0.95);
}

#fatigueText {
  margin-top: 10px;
  font-size: 22px;
}

#retryBtn {
  display: none;
  width: 220px;
  margin-top: 20px;
  cursor: pointer;
  transition: transform 0.1s;
}

#retryBtn:hover {
  transform: scale(1.05);
}

#retryBtn:active {
  transform: scale(0.95);
}

@keyframes shake {
  0% { transform: translateX(0); }
  50% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

</style>
</head>

<body>

<h1>💪 筋トレタイピング 💪</h1>

<input
  id="nameInput"
  placeholder="名前を入力"
>

<br><br>

<img
  id="character"
  src="lv1_idle.png"
>

<div id="text"></div>

<input
  id="input"
  type="text"
  autofocus
  autocomplete="off"
  spellcheck="false"
>

<div>
  <div id="timer">TIME: 60</div>

  <div
    id="combo"
    class="combo"
  >
    COMBO x0
  </div>

  <div id="score">
    SCORE: 0
  </div>

  <div id="fatigueText"></div>
</div>

<h2>🏆 ランキング</h2>

<ol id="ranking"></ol>

<img
  id="retryBtn"
  src="retry.png"
>

<audio
  id="okSound"
  src="ok.mp3"
></audio>

<audio
  id="missSound"
  src="miss.mp3"
></audio>

<script>

const texts = [
  "スクワットは下半身を鍛える",
  "タンパク質は筋肉の材料",
  "フォームが重要",
  "継続は力なり",
  "筋肉は裏切らない",
  "毎日の努力が大切"
];

const characters = [
  "lv1_idle.png",
  "lv2_idle.png",
  "lv3_idle.png",
  "lv4_idle.png",
  "lv5_idle.png"
];

let current = "";
let score = 0;
let combo = 0;
let fatigue = 0;
let time = 60;

let timerInterval;
let lifting = false;
let missLocked = false;

const input =
  document.getElementById("input");

const textEl =
  document.getElementById("text");

const comboEl =
  document.getElementById("combo");

const scoreEl =
  document.getElementById("score");

const timerEl =
  document.getElementById("timer");

const fatigueText =
  document.getElementById("fatigueText");

const char =
  document.getElementById("character");

const rankingEl =
  document.getElementById("ranking");

const retryBtn =
  document.getElementById("retryBtn");

const nameInput =
  document.getElementById("nameInput");

const okSound =
  document.getElementById("okSound");

const missSound =
  document.getElementById("missSound");

function newText() {

  current =
    texts[
      Math.floor(
        Math.random() * texts.length
      )
    ];

  textEl.textContent = current;

  input.value = "";
}

function getLevel() {

  if (score < 100) return 0;
  if (score < 300) return 1;
  if (score < 600) return 2;
  if (score < 1000) return 3;

  return 4;
}

function updateCharacter() {

  if (lifting) return;

  char.src =
    characters[getLevel()];
}

function playLift() {

  if (lifting) return;

  lifting = true;

  char.src = "lift_up.png";

  setTimeout(() => {

    char.src = "lift_down.png";

  }, 120);

  setTimeout(() => {

    lifting = false;

    updateCharacter();

  }, 240);
}

function updateEffects() {

  char.classList.remove(
    "power",
    "speed",
    "tired",
    "exhausted"
  );

  // コンボ演出
  if (combo >= 20) {

    char.classList.add("power");

  } else if (combo >= 10) {

    char.classList.add("speed");
  }

  // 疲労演出
  if (fatigue > 80) {

    char.classList.add(
      "exhausted"
    );

    fatigueText.textContent =
      "😵 疲労MAX";

  } else if (fatigue > 50) {

    char.classList.add(
      "tired"
    );

    fatigueText.textContent =
      "🥵 疲れている";

  } else {

    fatigueText.textContent = "";
  }
}

function startTimer() {

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {

    time--;

    timerEl.textContent =
      "TIME: " + time;

    if (time <= 0) {

      clearInterval(
        timerInterval
      );

      endGame();
    }

  }, 1000);
}

function endGame() {

  input.disabled = true;

  retryBtn.style.display =
    "inline-block";

  saveRanking();

  showRanking();

  alert(
    "終了！ スコア: " + score
  );
}

function saveRanking() {

  const name =
    nameInput.value || "名無し";

  let data = JSON.parse(
    localStorage.getItem(
      "ranking"
    ) || "[]"
  );

  data.push({
    name,
    score
  });

  data.sort((a, b) =>
    b.score - a.score
  );

  data = data.slice(0, 5);

  localStorage.setItem(
    "ranking",
    JSON.stringify(data)
  );
}

function showRanking() {

  rankingEl.innerHTML = "";

  let data = JSON.parse(
    localStorage.getItem(
      "ranking"
    ) || "[]"
  );

  data.forEach(d => {

    const li =
      document.createElement("li");

    li.textContent =
      d.name + " - " + d.score;

    rankingEl.appendChild(li);
  });
}

input.addEventListener(
  "input",
  () => {

    const val = input.value;

    // 正しい入力に戻ったら解除
    if (
      current.startsWith(val)
    ) {
      missLocked = false;
    }

    // 完全一致
    if (val === current) {

      score += 50;

      combo++;

      fatigue = Math.max(
        0,
        fatigue - 5
      );

      okSound.currentTime = 0;
      okSound.play();

      playLift();

      newText();

      missLocked = false;

      comboEl.textContent =
        "COMBO x" + combo;
    }

    // ミス
    else if (
      !current.startsWith(val)
      && !missLocked
    ) {

      combo = 0;

      fatigue = Math.min(
        100,
        fatigue + 15
      );

      missSound.currentTime = 0;
      missSound.play();

      // 入力リセット
      input.value = "";

      missLocked = true;

      comboEl.textContent =
        "MISS!";

      setTimeout(() => {

        comboEl.textContent =
          "COMBO x0";

      }, 500);
    }

    scoreEl.textContent =
      "SCORE: " + score;

    updateCharacter();

    updateEffects();
  }
);

retryBtn.addEventListener(
  "click",
  () => {

    score = 0;
    combo = 0;
    fatigue = 0;
    time = 60;

    lifting = false;
    missLocked = false;

    input.disabled = false;

    input.value = "";

    comboEl.textContent =
      "COMBO x0";

    scoreEl.textContent =
      "SCORE: 0";

    timerEl.textContent =
      "TIME: 60";

    fatigueText.textContent =
      "";

    retryBtn.style.display =
      "none";

    updateCharacter();

    updateEffects();

    newText();

    input.focus();

    startTimer();
  }
);

newText();

updateCharacter();

updateEffects();

startTimer();

showRanking();

</script>

</body>
</html>
