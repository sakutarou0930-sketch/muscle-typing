<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>
body {
  background:#111;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

#character {
  width:256px;
  image-rendering: pixelated;
  transition: all 0.2s;
}

#text-container {
  margin: 20px;
}

#text-jp {
  font-size:24px;
  font-weight: bold;
}

#text-en {
  font-size:26px; 
  color: #555;    
  margin-top: 5px;
  letter-spacing: 2px;
}

.typed {
  color: #0f0;
  text-shadow: 0 0 5px #0f0;
}

.combo { font-size:28px; color:yellow; }
.power { filter: drop-shadow(0 0 10px orange); transform: scale(1.1); }
.speed { animation: shake 0.1s infinite; }
.tired { filter: brightness(0.7); }
.exhausted { filter: grayscale(0.6); transform: scale(0.95); }
.miss { animation: miss-shake 0.2s; filter: drop-shadow(0 0 15px red); } 

@keyframes shake {
  0% { transform: translateX(0); }
  50% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

@keyframes miss-shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  75% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}

#nameInput {
  margin-top:10px;
  padding:5px;
}

#startButton {
  padding: 10px 20px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  background: orange;
  border: none;
  border-radius: 5px;
  margin-bottom: 10px;
}
#startButton:hover {
  background: darkorange;
}

/* リトライボタン画像用のスタイル */
#retryButton {
  display: none; /* 初期状態では非表示 */
  cursor: pointer;
  margin: 30px auto;
  max-width: 250px; /* 画像が大きすぎる場合用 */
  transition: transform 0.1s;
}
#retryButton:hover {
  transform: scale(1.05); /* マウスオーバーで少し大きく */
}
#retryButton:active {
  transform: scale(0.95); /* クリックで少しへこむ */
}
</style>
</head>

<body>

<h1>💪 筋トレタイピング 💪</h1>

<input id="nameInput" placeholder="名前を入力">
<br><br>
<button id="startButton">ゲームスタート！</button>

<br><br>

<img id="character" src="lv1_idle.png" alt="筋トレキャラ">

<div id="text-container">
  <div id="text-jp">ゲームをスタートしてください</div>
  <div id="text-en"></div>
</div>

<div>
  <div id="timer">TIME: 60</div>
  <div id="combo" class="combo">COMBO x0</div>
  <div id="score">SCORE: 0</div>
  <div id="fatigueText">疲労度: 0%</div>
