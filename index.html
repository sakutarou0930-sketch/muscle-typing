<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>筋トレタイピング</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

#character{
  width:256px;
  image-rendering:pixelated;
}

#text{
  font-size:32px;
  margin:20px;
}

#roma{
  font-size:20px;
  color:#aaa;
  margin-bottom:20px;
}

#input{
  font-size:24px;
  padding:10px;
  width:60%;
}

#combo{
  color:yellow;
  font-size:28px;
  margin-top:10px;
}

.power{
  filter:drop-shadow(0 0 10px orange);
}

.speed{
  animation:shake 0.1s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  50%{transform:translateX(3px);}
  100%{transform:translateX(0);}
}
</style>
</head>

<body>

<h1>💪 筋トレタイピング 💪</h1>

<img id="character" src="lv1_idle.png">

<div id="text"></div>
<div id="roma"></div>

<input id="input" autofocus>

<div id="timer">TIME:60</div>
<div id="score">SCORE:0</div>
<div id="combo">COMBO x0</div>
<div id="fatigue"></div>

<script>

const questions = [

{
jp:"スクワット",
roma:"sukuwatto"
},

{
jp:"タンパク質",
roma:"tanpakushitsu"
},

{
jp:"フォームが重要",
roma:"fo-mugajuuyou"
},

{
jp:"継続は力なり",
roma:"keizokuhachikaranari"
}

];

let current;
let score = 0;
let combo = 0;
let fatigue = 0;
let time = 60;

const text = document.getElementById("text");
const roma = document.getElementById("roma");
const input = document.getElementById("input");

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const fatigueEl = document.getElementById("fatigue");
const timerEl = document.getElementById("timer");

const char = document.getElementById("character");

const normalCharacters = [
"lv1_idle.png",
"lv2_idle.png",
"lv3_idle.png",
"lv4_idle.png",
"lv5_idle.png"
];

function newQuestion(){

current =
questions[
Math.floor(Math.random()*questions.length)
];

text.textContent = current.jp;
roma.textContent = current.roma;

input.value = "";
}

function getLevel(){

if(score < 100) return 0;
if(score < 300) return 1;
if(score < 600) return 2;
if(score < 1000) return 3;

return 4;
}

function updateCharacter(){

if(fatigue > 80){
char.src = "exhausted.png";
fatigueEl.textContent = "限界状態";
return;
}

if(fatigue > 50){
char.src = "tired_big.png";
fatigueEl.textContent = "かなり疲れている";
return;
}

if(fatigue > 30){
char.src = "tired_small.png";
fatigueEl.textContent = "少し疲れている";
return;
}

fatigueEl.textContent = "";

char.src =
normalCharacters[getLevel()];
}

function playLift(){

if(fatigue > 80) return;

char.src = "lift_up.png";

setTimeout(()=>{

char.src = "lift_down.png";

},100);

setTimeout(()=>{

updateCharacter();

},200);
}

function updateEffects(){

char.classList.remove("power");
char.classList.remove("speed");

if(combo >= 20){

char.classList.add("power");

}
else if(combo >= 10){

char.classList.add("speed");

}
}

input.addEventListener("input",()=>{

const value = input.value;

if(current.roma.startsWith(value)){

combo++;

fatigue -= 2;

if(fatigue < 0) fatigue = 0;

playLift();

if(value === current.roma){

score += 50;

newQuestion();
}

}
else{

combo = 0;

fatigue += 15;

if(fatigue > 100) fatigue = 100;

}

updateCharacter();
updateEffects();

scoreEl.textContent =
"SCORE:" + score;

comboEl.textContent =
"COMBO x" + combo;

});

function startTimer(){

const timer = setInterval(()=>{

time--;

timerEl.textContent =
"TIME:" + time;

if(time <= 0){

clearInterval(timer);

input.disabled = true;

alert("終了！ SCORE:" + score);

}

},1000);

}

newQuestion();
updateCharacter();
startTimer();

</script>

</body>
</html>
